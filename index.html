<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám phá giá trị lượng giác </title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .app-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 25px;
        }

        .left-panel, .right-panel { display: flex; flex-direction: column; gap: 20px; }
        
        .circle-box {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            background: white;
            position: relative;
        }

        .results-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        .res-item {
            padding: 12px; border-radius: 8px; text-align: center;
            background: var(--bg-light); border-bottom: 4px solid #cbd5e1;
        }
        .res-item.cos { border-color: var(--primary); }
        .res-item.sin { border-color: var(--danger); }
        .res-item.tan { border-color: var(--success); }
        .res-item.cot { border-color: var(--warning); }
        .res-label { font-size: 0.85em; color: #64748b; margin-bottom: 4px; }
        .res-val { font-size: 1.2em; font-weight: bold; }

        h2 { 
            font-size: 1.1rem; color: #1e293b; text-transform: uppercase;
            border-left: 4px solid var(--primary); padding-left: 10px; margin: 0; 
        }

        table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; font-size: 0.9em; }
        th, td { padding: 10px; text-align: center; border: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
        .active-quad { background: #fffbeb !important; font-weight: bold; }

        .btn-group { display: flex; gap: 8px; }
        .btn {
            flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;
            background: white; cursor: pointer; transition: 0.2s; font-size: 0.9em;
        }
        .btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .special-angles { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .angle-btn {
            padding: 8px 2px; font-size: 0.75em; border: 1px solid #e2e8f0;
            background: white; border-radius: 4px; cursor: pointer;
        }
        .angle-btn:hover { border-color: var(--primary); background: #f1f5f9; }

        /* SVG */
        #trig-svg { width: 100%; height: auto; }
        .axis { stroke: #94a3b8; stroke-width: 1.5; }
        .arrow { fill: #94a3b8; }
        .unit-circle { fill: none; stroke: #e2e8f0; stroke-width: 2; }
        .radius-line { stroke: #1e293b; stroke-width: 2.5; }
        .quad-label { fill: #cbd5e1; font-size: 24px; font-style: italic; font-weight: bold; pointer-events: none; }
        .arc-path { fill: rgba(37, 99, 235, 0.1); stroke: var(--primary); stroke-width: 1; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="left-panel">
        <div class="circle-box">
            <svg id="trig-svg" viewBox="0 0 400 400">
                <!-- Định nghĩa đầu mũi tên -->
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
                    </marker>
                </defs>

                <!-- 4 Góc phần tư -->
                <text x="300" y="110" class="quad-label">I</text>
                <text x="100" y="110" class="quad-label">II</text>
                <text x="100" y="300" class="quad-label">III</text>
                <text x="300" y="300" class="quad-label">IV</text>

                <!-- Trục tọa độ -->
                <line x1="20" y1="200" x2="380" y2="200" class="axis" marker-end="url(#arrowhead)" />
                <line x1="200" y1="380" x2="200" y2="25" class="axis" marker-end="url(#arrowhead)" />
                <text x="385" y="210" font-size="14" fill="var(--primary)" font-weight="bold">cos</text>
                <text x="215" y="30" font-size="14" fill="var(--danger)" font-weight="bold">sin</text>
                <text x="180" y="220" font-size="16" font-weight="bold">O</text>

                <circle cx="200" cy="200" r="150" class="unit-circle" />

                <!-- Hình chiếu -->
                <line id="line-cos" x1="200" y1="200" x2="200" y2="200" stroke="var(--primary)" stroke-dasharray="3" stroke-width="1.5" />
                <line id="line-sin" x1="200" y1="200" x2="200" y2="200" stroke="var(--danger)" stroke-dasharray="3" stroke-width="1.5" />

                <path id="angle-arc" class="arc-path" d="" />
                <line id="radius" x1="200" y1="200" x2="350" y2="200" class="radius-line" />
                <circle id="point-m" cx="350" cy="200" r="6" fill="#1e293b" />
            </svg>
        </div>

        <div class="results-grid">
            <div class="res-item cos"><div class="res-label">cos α</div><div class="res-val" id="out-cos">1.000</div></div>
            <div class="res-item sin"><div class="res-label">sin α</div><div class="res-val" id="out-sin">0.000</div></div>
            <div class="res-item tan"><div class="res-label">tan α</div><div class="res-val" id="out-tan">0.000</div></div>
            <div class="res-item cot"><div class="res-label">cot α</div><div class="res-val" id="out-cot">∞</div></div>
        </div>
    </div>

    <div class="right-panel">
        <h2>Khám phá dấu của giá trị lượng giác</h2>
        
        <table id="sign-table">
            <thead><tr><th>Góc</th><th>sin</th><th>cos</th><th>tan</th><th>cot</th></tr></thead>
            <tbody>
                <tr id="qI"><td>I</td><td>+</td><td>+</td><td>+</td><td>+</td></tr>
                <tr id="qII"><td>II</td><td>+</td><td>-</td><td>-</td><td>-</td></tr>
                <tr id="qIII"><td>III</td><td>-</td><td>-</td><td>+</td><td>+</td></tr>
                <tr id="qIV"><td>IV</td><td>-</td><td>+</td><td>-</td><td>-</td></tr>
            </tbody>
        </table>

        <div>
            <p style="font-size: 0.85em; margin: 0 0 8px 0; color: #64748b;">Đơn vị:</p>
            <div class="btn-group">
                <button id="unit-deg" class="btn active" onclick="changeUnit('deg')">Độ (°)</button>
                <button id="unit-rad" class="btn" onclick="changeUnit('rad')">Radian (π)</button>
            </div>
        </div>

        <div>
            <p style="font-size: 0.85em; margin: 0 0 8px 0; color: #64748b;">Hướng đo & Góc đặc biệt:</p>
            <div class="btn-group" style="margin-bottom: 12px;">
                <button id="dir-pos" class="btn active" onclick="changeDir(1)">Chiều dương (+)</button>
                <button id="dir-neg" class="btn" onclick="changeDir(-1)">Chiều âm (-)</button>
            </div>
            <div class="special-angles" id="angle-list"></div>
        </div>
    </div>
</div>

<script>
    let angleDeg = 0;
    let unit = 'deg';
    let dir = 1;
    const R = 150, cx = 200, cy = 200;

    const baseAngles = [0, 30, 45, 60, 90, 120, 135, 150, 180, 210, 225, 240, 270, 300, 315, 330, 360];
    const radStrings = ["0", "π/6", "π/4", "π/3", "π/2", "2π/3", "3π/4", "5π/6", "π", "7π/6", "5π/4", "4π/3", "3π/2", "5π/3", "7π/4", "11π/6", "2π"];

    function renderButtons() {
        const list = document.getElementById('angle-list');
        list.innerHTML = '';
        baseAngles.forEach((a, i) => {
            const btn = document.createElement('button');
            btn.className = 'angle-btn';
            let val = a * dir;
            if (unit === 'deg') {
                btn.innerText = val + '°';
            } else {
                btn.innerText = (dir === -1 && a !== 0 ? "-" : "") + radStrings[i];
            }
            btn.onclick = () => { angleDeg = val; update(); };
            list.appendChild(btn);
        });
    }

    function changeUnit(u) {
        unit = u;
        document.getElementById('unit-deg').classList.toggle('active', u === 'deg');
        document.getElementById('unit-rad').classList.toggle('active', u === 'rad');
        renderButtons();
    }

    function changeDir(d) {
        dir = d;
        document.getElementById('dir-pos').classList.toggle('active', d === 1);
        document.getElementById('dir-neg').classList.toggle('active', d === -1);
        renderButtons();
    }

    function update() {
        let rad = angleDeg * Math.PI / 180;
        let x = cx + R * Math.cos(rad);
        let y = cy - R * Math.sin(rad);

        document.getElementById('radius').setAttribute('x2', x);
        document.getElementById('radius').setAttribute('y2', y);
        document.getElementById('point-m').setAttribute('cx', x);
        document.getElementById('point-m').setAttribute('cy', y);

        // Hình chiếu
        document.getElementById('line-cos').setAttribute('x2', x);
        document.getElementById('line-sin').setAttribute('x1', x);
        document.getElementById('line-sin').setAttribute('y1', y);
        document.getElementById('line-sin').setAttribute('x2', x);
        document.getElementById('line-sin').setAttribute('y2', cy);

        // Vẽ cung tròn góc
        let largeArc = Math.abs(angleDeg) > 180 ? 1 : 0;
        let sweep = angleDeg > 0 ? 0 : 1;
        let d = `M 350 200 A 150 150 0 ${largeArc} ${sweep} ${x} ${y} L 200 200 Z`;
        document.getElementById('angle-arc').setAttribute('d', angleDeg === 0 ? "" : d);

        // Giá trị
        let s = Math.sin(rad), c = Math.cos(rad);
        document.getElementById('out-sin').innerText = s.toFixed(3);
        document.getElementById('out-cos').innerText = c.toFixed(3);
        document.getElementById('out-tan').innerText = Math.abs(c) < 0.001 ? "KĐĐ" : (s/c).toFixed(3);
        document.getElementById('out-cot').innerText = Math.abs(s) < 0.001 ? "KĐĐ" : (c/s).toFixed(3);

        // Highlight bảng xét dấu
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-quad'));
        let norm = ((angleDeg % 360) + 360) % 360;
        if (norm > 0 && norm < 90) document.getElementById('qI').classList.add('active-quad');
        else if (norm > 90 && norm < 180) document.getElementById('qII').classList.add('active-quad');
        else if (norm > 180 && norm < 270) document.getElementById('qIII').classList.add('active-quad');
        else if (norm > 270 && norm < 360) document.getElementById('qIV').classList.add('active-quad');
    }

    renderButtons();
    update();
</script>

</body>
</html>
